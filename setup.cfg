# All configuration for plugins and other utils is defined here.
# Read more about `setup.cfg` here:
# https://docs.python.org/3/distutils/configfile.html

[coverage:run]
branch = True
omit = *venv/*,tests/*,*migrations*

[flake8]
max-complexity = 8
statistics = true
max-line-length = 88
doctests = True
exclude =
    .git,
    __pycache__,
    docs/source/conf.py,
    old,
    build,
    dist

per-file-ignores =
    # imported but unused
    __init__.py: F401

extend-ignore =
    # E501: line too long
    H101,
    # E203: whitespace before ':'
    E203,
    # E501: line too long
    E501,


# Flake plugins:
inline-quotes = double
accept-encodings = utf-8
max-imports = 16
max-line-complexity = 15
max-methods = 12
max-expressions = 10
max-module-members = 10
max-local-variables = 8
max-awaits = 6
max-try-body-length = 1
nested-classes-whitelist = 'Params,Config,Meta'
radon-max-cc = 10


[tool:pytest]
# py.test options:
asyncio_mode = auto
norecursedirs = *.egg .eggs dist build docs .tox .git __pycache__ migrations
testpaths = tests
# You will need to measure your tests speed with `-n auto` and|or `--forked` and without it,
# so you can see whether it gives you any performance gain, or just gives
addopts =
  -ra
  --showlocals

markers =
  slow: marks tests as slow (deselect with '-m "not slow"')
  serial
  postgresql


[mypy]
python_version = 3.13
check_untyped_defs = True
disallow_any_explicit = True
disallow_any_generics = True
disallow_untyped_calls = True
ignore_errors = False
ignore_missing_imports = False
strict_optional = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_unused_configs = True
warn_return_any = True


[mypy.migrations.*]
ignore_errors = True

[tools.isort]
profile = "black"
