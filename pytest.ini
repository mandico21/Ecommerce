[pytest]
# Директория тестов
testpaths = tests

# Паттерн для файлов тестов
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Включаем asyncio mode
asyncio_mode = auto

# Минимальная версия pytest
minversion = 8.0

# Добавляем путь к приложению
pythonpath = .

# Маркеры
markers =
    unit: Unit тесты (без внешних зависимостей)
    integration: Интеграционные тесты (требуют БД)
    slow: Медленные тесты

# Настройки вывода
addopts =
    -v
    --tb=short
    --strict-markers
    -ra

# Игнорируем предупреждения
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Настройки логирования при тестах
log_cli = true
log_cli_level = WARNING
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s

# Таймаут для тестов (секунды)
timeout = 30

# Покрытие кода
[tool:coverage]
source = app
omit =
    */tests/*
    */__pycache__/*
    */migrations/*
